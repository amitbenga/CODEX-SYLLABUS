<!DOCTYPE html>
<html dir="rtl" lang="he" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בונה המוצר — מהדורת לימוד</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Noto+Serif+Hebrew:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="newspaper.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="syllabus-data.js"></script>
</head>
<body>
<div id="color-layer"></div>
<canvas id="dig-canvas"></canvas>
<div id="root"></div>

<script src="news-fx.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "electric",
  "trail": "medium",
  "grain": true
}/*EDITMODE-END*/;

const TRAIL_PX = { fine: 16, medium: 26, bold: 40 };
const pad2 = (n) => String(n).padStart(2, "0");
const CATEGORIES = (() => {
  const seen = [];
  SYLLABUS.units.forEach(u => { if (!seen.includes(u.category)) seen.push(u.category); });
  return seen;
})();
const CAT_EN = {
  "יסודות": "Foundations",
  "דאטה, זיכרון וסוכנים": "Data & Agents",
  "דאטה וארכיטקטורה": "Architecture",
  "ממשק וחווית מוצר": "Interface",
  "מערכת ושרת": "Backend",
  "איכות ופרודקשן": "Quality",
  "Delivery והובלה": "Delivery",
  "עבודה עם סוכנים": "Agents",
  "Capstone": "Capstone",
};

// ── Top bar ───────────────────────────────────────────────
function TopBar({ done, total, dark, onTheme, onHome, inUnit }) {
  return (
    <div className="topbar">
      <button className="topbar__home" onClick={onHome}>
        בונה המוצר
      </button>
      <span className="topbar__sub mono">{inUnit ? "FEATURE" : "FRONT PAGE"}</span>
      <div className="spacer"></div>
      <div className="pressrun">
        <span className="pressrun__n mono">PRESS RUN</span>
        <div className="pressrun__dots">
          {SYLLABUS.units.map(u => (
            <span key={u.id} className={"pressrun__dot" + (done.has(u.id) ? " done" : "")} title={u.title}></span>
          ))}
        </div>
        <span className="pressrun__n">{pad2(done.size)}/{total}</span>
      </div>
      <button className="toplink mono" onClick={onTheme}>{dark ? "מהדורת בוקר ☀" : "מהדורת ערב ☾"}</button>
    </div>
  );
}

// ── Masthead ──────────────────────────────────────────────
function Masthead() {
  const today = new Date().toLocaleDateString("he-IL", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  return (
    <div className="masthead">
      <div className="stamp stamp--postmark">מהדורת<br/>לימוד<br/>2026</div>
      <div className="stamp stamp--vol">VOL. I<br/>NO. 1</div>
      <div className="masthead__top">
        <div className="col">
          <span className="mono">{today}</span>
          <span className="mono">תל אביב · ישראל</span>
        </div>
        <div className="col col--end">
          <span className="mono">מחיר: סקרנות</span>
          <span className="mono">EST. MMXXVI</span>
        </div>
      </div>
      <div className="rule"></div>
      <div className="nameplate">
        <span className="nameplate__orn">❦</span>
        <h1 className="nameplate__he">בּוֹנֵה הַמּוּצָר הַטֶּכְנִי</h1>
        <span className="nameplate__en">The Technical Product Builder</span>
      </div>
      <div className="rule--double"></div>
      <div className="masthead__strip">
        <span>מסלול בן 17 שבועות</span>
        <span className="dot">◆</span>
        <span className="mono">15 UNITS</span>
        <span className="dot">◆</span>
        <span>AI-Native Full-Stack Product Lead</span>
        <span className="dot">◆</span>
        <span className="mono">A FIELD COURSE</span>
      </div>
    </div>
  );
}

// ── Front page ────────────────────────────────────────────
function FrontPage({ done, onOpen }) {
  const ramp = SYLLABUS.successLevels;
  return (
    <div>
      <Masthead />

      <nav className="folio">
        {CATEGORIES.map(cat => (
          <button key={cat} className="folio__item" onClick={() => {
            const el = document.getElementById("cat-" + cat);
            if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 60, behavior: "smooth" });
          }}>
            {CAT_EN[cat] || cat}
          </button>
        ))}
      </nav>

      {/* Lead */}
      <article className="lead">
        <div>
          <div className="lead__kicker mono">Lead — מטרת המסלול</div>
          <h2 className="lead__hl">{SYLLABUS.roleTitle}</h2>
          <p className="lead__body">
            <span className="dropcap">ל</span>
            {SYLLABUS.coreGoal}
          </p>
          <div className="lead__outcomes">
            {SYLLABUS.outcomes.map((o, i) => (
              <div className="lead__outcome" key={i}>
                <span className="n mono">{pad2(i + 1)}</span>
                <span>{o}</span>
              </div>
            ))}
          </div>
        </div>

        <aside className="runcase">
          <div className="runcase__tag mono">Running Case</div>
          <div className="runcase__title">{SYLLABUS.runningCase.title}</div>
          <div className="runcase__body">{SYLLABUS.runningCase.description}</div>
          <div className="rule--hair runcase__rule"></div>
          <div className="runcase__meta mono">
            DURATION · 17 WEEKS<br/>
            UNITS · 15<br/>
            CASE · THERAPIST CRM
          </div>
        </aside>
      </article>

      <p className="dingbat"><span className="dingbat__mark">❖</span> לוח הזמנים <span className="dingbat__mark">❖</span></p>

      {/* Almanac */}
      <section>
        <div className="section-head">
          <span className="section-head__no mono">§1</span>
          <span className="section-head__en">The Almanac</span>
          <span className="section-head__he">לוח 17 השבועות</span>
          <span className="spacer"></span>
        </div>
        <div className="almanac">
          {SYLLABUS.weekPlan.map(wp => {
            const u = SYLLABUS.units.find(x => x.id === wp.unitId);
            return (
              <div className="almanac__row" key={wp.week} onClick={() => onOpen(u)}>
                <span className={"almanac__wk mono" + (done.has(wp.unitId) ? " done" : "")}>
                  {done.has(wp.unitId) ? "✓" : ""}W{pad2(wp.week)}
                </span>
                <span className="almanac__title">{u.title}</span>
                <span className="almanac__focus">{wp.focus}</span>
              </div>
            );
          })}
        </div>
      </section>

      {/* Units by category */}
      <section>
        <div className="section-head" style={{ marginTop: 56 }}>
          <span className="section-head__no mono">§2</span>
          <span className="section-head__en">Index of Units</span>
          <span className="section-head__he">מדור היחידות</span>
          <span className="spacer"></span>
        </div>
        {CATEGORIES.map(cat => {
          const list = SYLLABUS.units.filter(u => u.category === cat);
          return (
            <div key={cat} id={"cat-" + cat}>
              <div className="catbar">
                <span className="tag mono">{CAT_EN[cat] || ""}</span>
                {cat}
              </div>
              <div className="articles">
                {list.map(u => (
                  <article className="article" key={u.id} onClick={() => onOpen(u)}>
                    <div className="article__top">
                      <span className={"article__num" + (done.has(u.id) ? " done" : "")}>
                        {done.has(u.id) ? "✓" : ""}{pad2(u.num)}
                      </span>
                      <span className="article__wk mono">{u.weekLabel.replace("שבועות", "WK").replace("שבוע", "WK")}</span>
                    </div>
                    <h3 className="article__hl">{u.title}</h3>
                    <p className="article__deck">{u.summary}</p>
                    <div className="article__more mono">CONTINUE READING ←</div>
                  </article>
                ))}
              </div>
            </div>
          );
        })}
      </section>

      {/* Standings */}
      <section>
        <div className="section-head" style={{ marginTop: 56 }}>
          <span className="section-head__no mono">§3</span>
          <span className="section-head__en">Standings</span>
          <span className="section-head__he">חמש דרגות שליטה</span>
          <span className="spacer"></span>
        </div>
        <div className="standings">
          {ramp.map(l => (
            <div className="standing" key={l.level}>
              <div className="standing__lvl mono">{pad2(l.level)}</div>
              <div className="standing__title">{l.title}</div>
              <div className="standing__body">{l.description}</div>
            </div>
          ))}
        </div>
      </section>
    </div>
  );
}

// ── Feature (unit page) ───────────────────────────────────
function Sub({ no, en, he }) {
  return (
    <div className="sub">
      <span className="sub__no mono">{no}</span>
      <span className="sub__en">{en}</span>
      <span className="sub__he">{he}</span>
      <span className="spacer"></span>
    </div>
  );
}

function Feature({ unit, done, onComplete, onBack, onNav }) {
  const isDone = done.has(unit.id);
  const idx = SYLLABUS.units.findIndex(u => u.id === unit.id);
  const prev = SYLLABUS.units[idx - 1];
  const next = SYLLABUS.units[idx + 1];

  React.useEffect(() => {
    document.documentElement.scrollTop = 0; document.body.scrollTop = 0;
  }, [unit.id]);

  return (
    <div className="feature" data-screen-label={"Unit " + unit.num}>
      <button className="crumb mono" onClick={onBack}>← FRONT PAGE</button>

      <header className="feature__head">
        <div>
          <div className="feature__num mono">{pad2(unit.num)}</div>
          <div className="feature__wk mono">{unit.weekLabel}</div>
          <div className="feature__cat">{unit.category}</div>
        </div>
        <div>
          <h1 className="feature__hl">{unit.title}</h1>
          <p className="feature__deck">{unit.summary}</p>
          <button
            className={"btn-stamp" + (isDone ? " done" : "")}
            onClick={(e) => onComplete(e, unit)}
          >
            {isDone ? "✓ הושלם — בטל סימון" : "סמן כהושלם ←"}
          </button>
        </div>
      </header>

      <div className="rule"></div>

      <section className="fsec">
        <Sub no="01" en="Goals" he="מטרות" />
        <div className="goals">
          {unit.goals.map((g, i) => (
            <div className="goal" key={i}><span className="goal__m mono">—</span><span className="goal__t">{g}</span></div>
          ))}
        </div>
      </section>
      <div className="fsec__rule"></div>

      <section className="fsec">
        <Sub no="02" en="Topics" he="נושאים" />
        <div className="topics">
          {unit.topics.map((tp, i) => <span className="topic" key={i}>{tp}</span>)}
        </div>
      </section>
      <div className="fsec__rule"></div>

      <section className="fsec">
        <div className="cols2">
          <div>
            <Sub no="03" en="Deliverable" he="תוצר" />
            <div className="deliverable">{unit.deliverable}</div>
          </div>
          <div>
            <Sub no="04" en="Exercise" he="תרגיל מרכזי" />
            <div className="exercise">{unit.exercise}</div>
          </div>
        </div>
      </section>
      <div className="fsec__rule"></div>

      <section className="fsec">
        <div className="cols2">
          <div>
            <Sub no="05" en="Understanding Test" he="מבחן הבנה" />
            <p className="utest">״{unit.understandingTest}״</p>
          </div>
          <div>
            <Sub no="06" en="Management Lens" he="עדשת ניהול" />
            <p className="lens">{unit.managementLens}</p>
          </div>
        </div>
      </section>
      <div className="fsec__rule"></div>

      <section className="fsec">
        <Sub no="07" en="Red Flags" he="דגלים אדומים" />
        <div className="redflags">
          {unit.redFlags.map((f, i) => (
            <div className="redflag" key={i}><span className="redflag__m">▲</span><span className="redflag__t">{f}</span></div>
          ))}
        </div>
      </section>

      <div className="rule"></div>
      <div className="pager">
        {prev ? (
          <button className="pager__btn" onClick={() => onNav(prev)}>
            <div className="pager__lbl mono">PREV · {pad2(prev.num)}</div>
            <div className="pager__t">{prev.title}</div>
          </button>
        ) : <span></span>}
        {next ? (
          <button className="pager__btn pager__btn--next" onClick={() => onNav(next)}>
            <div className="pager__lbl mono">NEXT · {pad2(next.num)}</div>
            <div className="pager__t">{next.title}</div>
          </button>
        ) : <span></span>}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────
function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [dark, setDark] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("tpb2_dark") || "false"); } catch { return false; }
  });
  const [done, setDone] = React.useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem("tpb2_done") || "[]")); } catch { return new Set(); }
  });
  const [unitId, setUnitId] = React.useState(() => localStorage.getItem("tpb2_unit") || null);

  const unit = unitId ? SYLLABUS.units.find(u => u.id === unitId) : null;

  // init FX once
  React.useEffect(() => {
    NewsFX.init({ dark });
    NewsFX.setPalette(tw.palette);
    NewsFX.setTrail(TRAIL_PX[tw.trail] || 26);
    NewsFX.setGrain(tw.grain);
  }, []);

  React.useEffect(() => {
    document.documentElement.dataset.theme = dark ? "dark" : "light";
    NewsFX.setTheme(dark);
    localStorage.setItem("tpb2_dark", JSON.stringify(dark));
  }, [dark]);
  React.useEffect(() => { NewsFX.setPalette(tw.palette); }, [tw.palette]);
  React.useEffect(() => { NewsFX.setTrail(TRAIL_PX[tw.trail] || 26); }, [tw.trail]);
  React.useEffect(() => { NewsFX.setGrain(tw.grain); }, [tw.grain]);
  React.useEffect(() => { localStorage.setItem("tpb2_done", JSON.stringify([...done])); }, [done]);
  React.useEffect(() => {
    if (unitId) localStorage.setItem("tpb2_unit", unitId);
    else localStorage.removeItem("tpb2_unit");
  }, [unitId]);

  const toggle = (id) => setDone(prev => {
    const nx = new Set(prev); nx.has(id) ? nx.delete(id) : nx.add(id); return nx;
  });

  const handleComplete = (e, u) => {
    if (done.has(u.id)) { toggle(u.id); return; }
    const r = e.currentTarget.getBoundingClientRect();
    NewsFX.shatter(r.left + r.width / 2, r.top + r.height / 2, {
      label: { num: u.num, title: u.title },
      onPeak: () => toggle(u.id),
    });
  };

  return (
    <React.Fragment>
      <TopBar
        done={done} total={SYLLABUS.units.length}
        dark={dark} onTheme={() => setDark(d => !d)}
        onHome={() => setUnitId(null)} inUnit={!!unit}
      />
      <main className="sheet">
        {unit ? (
          <Feature
            unit={unit} done={done}
            onComplete={handleComplete}
            onBack={() => setUnitId(null)}
            onNav={(u) => setUnitId(u.id)}
          />
        ) : (
          <FrontPage done={done} onOpen={(u) => setUnitId(u.id)} />
        )}
      </main>

      <TweaksPanel>
        <TweakSection label="Hidden colour" />
        <TweakRadio label="Palette" value={tw.palette}
          options={["spectrum", "sunrise", "electric"]}
          onChange={(v) => setTweak("palette", v)} />
        <TweakSection label="Dig trail" />
        <TweakRadio label="Width" value={tw.trail}
          options={["fine", "medium", "bold"]}
          onChange={(v) => setTweak("trail", v)} />
        <TweakSection label="Paper" />
        <TweakToggle label="Print grain" value={tw.grain}
          onChange={(v) => setTweak("grain", v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
